name: Update Complete Models

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  update-complete-models:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for git log timestamps

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate complete-models.csv
        run: python scripts/generate_complete_models.py

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --exit-code complete-models.csv; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes to complete-models.csv"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Changes detected in complete-models.csv"
          fi

      - name: Create Pull Request
        if: steps.check_changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Update complete-models.csv"
          branch: update-complete-models
          delete-branch: true
          title: "Update complete-models.csv with latest benchmark results"
          body: |
            This PR updates the `complete-models.csv` file with the latest models that have completed all 5 benchmarks.
            
            The file was automatically generated by the `generate_complete_models.py` script.
            
            **Changes:**
            - Updated list of models with complete benchmark results (5 entries in scores.json)
            - Timestamps reflect the last modification time of each scores.json file in UTC
            
            Please review and merge if the changes look correct.
          reviewers: |
            juanmichelini
            neubig
          labels: |
            automated
