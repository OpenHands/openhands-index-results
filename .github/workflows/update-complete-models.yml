name: Update Complete Models

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  update-complete-models:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for git log timestamps

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pydantic

      - name: Generate complete-models.json
        run: python scripts/generate_complete_models.py

      - name: Generate recommended-models.json
        run: python scripts/generate_recommended_models.py

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --exit-code complete-models.json recommended-models.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes to complete-models.json or recommended-models.json"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Changes detected in complete-models.json or recommended-models.json"
          fi

      - name: Create Pull Request
        if: steps.check_changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Update complete-models.json and recommended-models.json"
          branch: update-complete-models
          delete-branch: true
          title: "Update complete-models.json with latest benchmark results"
          body: |
            This PR updates the auto-generated benchmark summaries:

            - `complete-models.json`: models with results for all 5 benchmarks.
            - `recommended-models.json`: best model per cloud family (Claude, GPT,
              Gemini) and top open-weights models by OpenHands Index average.

            Files were generated by `scripts/generate_complete_models.py` and
            `scripts/generate_recommended_models.py`.

            **Changes:**
            - Updated list of models with complete benchmark results (5 entries in scores.json)
            - Timestamps reflect the last modification time of each scores.json file in UTC
            - Refreshed top recommended models per family for the docs auto-update job

            Please review and merge if the changes look correct.
          reviewers: |
            juanmichelini
            neubig
          labels: |
            automated

  update-verified-models:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Checkout software-agent-sdk
        uses: actions/checkout@v4
        with:
          repository: OpenHands/software-agent-sdk
          token: ${{ secrets.SDK_PAT }}
          path: software-agent-sdk

      - name: Update verified_models.py in place
        id: update
        # `continue-on-error` so we still open a PR for the resolvable additions
        # if SOME models are skipped (the script exits non-zero in that case).
        # The "Fail if any model was skipped" step below turns the workflow red
        # so the gap is loudly visible -- no `|| true`, no silent swallowing.
        continue-on-error: true
        run: |
          python scripts/update_verified_models.py --write

      - name: Detect changes to verified_models.py
        id: detect_changes
        working-directory: software-agent-sdk
        run: |
          if git diff --quiet openhands-sdk/openhands/sdk/llm/utils/verified_models.py; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes to verified_models.py"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Detected changes to verified_models.py:"
            git --no-pager diff openhands-sdk/openhands/sdk/llm/utils/verified_models.py
          fi

      - name: Create PR in software-agent-sdk
        if: steps.detect_changes.outputs.changed == 'true'
        # A stable branch name + peter-evans/create-pull-request keeps this
        # idempotent: subsequent runs update the same PR instead of opening
        # a duplicate every time main moves.
        uses: peter-evans/create-pull-request@v6
        with:
          path: software-agent-sdk
          token: ${{ secrets.SDK_PAT }}
          branch: automated/update-verified-models
          delete-branch: true
          commit-message: "Update verified_models.py with latest completed benchmark models"
          title: "Update verified_models.py with latest completed benchmark models"
          body: |
            This PR was automatically created by the Update Complete Models workflow in [openhands-index-results](https://github.com/OpenHands/openhands-index-results).

            It adds models that have completed all 5 benchmarks to the verified model lists in `verified_models.py`.

            See [complete-models.json](https://github.com/OpenHands/openhands-index-results/blob/main/complete-models.json) for the full list of completed models.
          assignees: juanmichelini
          labels: automated

      - name: Fail if any model was skipped for missing canonical ID
        if: steps.update.outcome == 'failure'
        run: |
          echo "::error::update_verified_models.py reported one or more completed models with no canonical litellm_model_id. See the 'Update verified_models.py in place' step log for the list."
          exit 1

  update-docs-recommendations:
    needs: update-complete-models
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repository
        uses: actions/checkout@v4
        with:
          path: index-results

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pydantic

      - name: Generate recommended-models.json
        working-directory: index-results
        run: python scripts/generate_recommended_models.py

      - name: Checkout OpenHands/docs
        uses: actions/checkout@v4
        with:
          repository: OpenHands/docs
          token: ${{ secrets.OPENHANDS_BOT_GITHUB_PAT_PUBLIC }}
          path: docs

      - name: Apply recommendations to docs
        id: apply
        run: |
          python index-results/scripts/update_docs_recommendations.py \
            --docs-root docs \
            --recommendations index-results/recommended-models.json
          cd docs
          if git diff --exit-code openhands/usage/llms/llms.mdx; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Create docs Pull Request
        if: steps.apply.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          path: docs
          token: ${{ secrets.OPENHANDS_BOT_GITHUB_PAT_PUBLIC }}
          commit-message: "Refresh recommended LLM models from OpenHands Index"
          branch: openhands/refresh-recommended-llms
          delete-branch: true
          title: "Refresh recommended LLM models from OpenHands Index"
          body: |
            Automated update of the recommended LLM tables in
            `openhands/usage/llms/llms.mdx`, sourced from the latest
            [OpenHands Index results](https://github.com/OpenHands/openhands-index-results).

            Generated by
            [`scripts/generate_recommended_models.py`](https://github.com/OpenHands/openhands-index-results/blob/main/scripts/generate_recommended_models.py)
            and applied by
            [`scripts/update_docs_recommendations.py`](https://github.com/OpenHands/openhands-index-results/blob/main/scripts/update_docs_recommendations.py).

            _This PR was created by an AI agent (OpenHands) on behalf of the OpenHands Index automation._
          labels: |
            automated
          reviewers: |
            juanmichelini
            neubig
